# ============================================
# GitHub Actions - Auto-Generate Sitemap & Deploy to GitHub Pages
# Website Bazar (WB)
# ============================================
name: Generate Sitemap & Deploy

on:
  push:
    branches: [main, master]
    paths:
      - '*.html'
      - 'blog/*.html'
      - 'portfolio/*.html'
      - 'scripts/generate-sitemap.py'
    paths-ignore:
      - 'sitemap.xml'
      - 'robots.txt'

  workflow_dispatch:
    inputs:
      domain:
        description: 'Production domain URL'
        required: false
        default: 'https://exnesssjaffri-sketch.github.io/WEB-DEVELOPMENT-AGENY'
        type: string

  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    name: Generate Sitemap & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: python -m pip install --upgrade pip

      - name: Generate Sitemap
        id: generate
        run: |
          DOMAIN="${{ github.event.inputs.domain || 'https://exnesssjaffri-sketch.github.io/WEB-DEVELOPMENT-AGENY' }}"
          echo "Generating sitemap for domain: $DOMAIN"
          python scripts/generate-sitemap.py --domain "$DOMAIN" --output sitemap.xml
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Validate Sitemap XML
        run: python scripts/validate-sitemap.py

      - name: Validate Robots.txt
        run: |
          echo "Validating robots.txt..."
          if [ ! -f robots.txt ]; then
            echo "robots.txt not found!"
            exit 1
          fi
          grep -q "User-agent:" robots.txt && echo "User-agent OK" || { echo "User-agent missing"; exit 1; }
          grep -q "Sitemap:" robots.txt && echo "Sitemap directive OK" || { echo "Sitemap missing"; exit 1; }
          grep -q "Disallow:" robots.txt && echo "Disallow directives OK" || echo "No Disallow found"
          echo "robots.txt validation passed"

      - name: Check for Changes
        id: changes
        run: |
          git add sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: auto-generate sitemap and robots.txt [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate Summary
        run: |
          echo "## Sitemap Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| sitemap.xml | Generated |" >> $GITHUB_STEP_SUMMARY
          echo "| robots.txt | Validated |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Pages | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed URL: https://exnesssjaffri-sketch.github.io/WEB-DEVELOPMENT-AGENY/" >> $GITHUB_STEP_SUMMARY